<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Gym</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym">
  <style>
    :root {
      --bg: #000; --surface: #1c1c1e; --surface2: #2c2c2e;
      --border: rgba(255,255,255,.1); --text: #fff;
      --text2: rgba(235,235,245,.8); --text3: rgba(235,235,245,.45);
      --accent: #0a84ff; --green: #30d158; --red: #ff453a; --orange: #ff9f0a;
      --safe-top: env(safe-area-inset-top,0px); --safe-bot: env(safe-area-inset-bottom,0px);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; background:var(--bg); }
    body { color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
      font-size:16px; line-height:1.4; display:flex; flex-direction:column; align-items:center; }
    #app { width:100%; max-width:430px; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

    /* Header */
    .hdr { flex-shrink:0; background:rgba(0,0,0,.85); backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border);
      padding:calc(var(--safe-top) + 10px) 16px 10px; }
    .hdr-row { display:flex; align-items:center; gap:8px; min-height:36px; }
    .back-btn { display:flex; align-items:center; gap:3px; background:none; border:none;
      color:var(--accent); font-size:16px; cursor:pointer; padding:4px 0; flex-shrink:0; }
    .hdr-title { font-size:17px; font-weight:600; flex:1; text-align:center; }
    .hdr-spacer { width:60px; }

    /* Scroll */
    .scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding:12px 16px calc(var(--safe-bot) + 80px); display:flex; flex-direction:column; gap:10px; }
    .scroll > * { flex-shrink:0; }

    /* Section label */
    .sec-lbl { font-size:12px; font-weight:600; color:var(--text3);
      text-transform:uppercase; letter-spacing:.5px; padding:0 4px; }

    /* Home session cards */
    .sess-card { background:var(--surface); border-radius:16px; overflow:hidden; }
    .sess-main { padding:14px 16px; display:flex; align-items:center; gap:12px;
      cursor:pointer; transition:opacity .15s; user-select:none; -webkit-user-select:none; }
    .sess-main:active { opacity:.65; }
    .sess-icon { width:44px; height:44px; border-radius:12px; display:flex;
      align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .ic-legs{background:rgba(255,159,10,.18);} .ic-pull{background:rgba(10,132,255,.18);}
    .ic-push{background:rgba(48,209,88,.18);} .ic-upper{background:rgba(191,90,242,.18);}
    .ic-swim{background:rgba(50,173,230,.18);} .ic-rest{background:rgba(255,255,255,.08);}
    .sess-info { flex:1; }
    .sess-type { font-size:17px; font-weight:600; }
    .sess-day  { font-size:13px; color:var(--text3); margin-top:1px; }
    .badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; }
    .badge-today { background:var(--accent); color:#fff; }
    .badge-done  { background:var(--green); color:#000; }
    .chevron { color:var(--text3); display:flex; align-items:center; }
    .sess-done-strip { opacity:.45; }
    .mark-done-row { padding:0 16px 12px; display:flex; }
    .mark-done-btn { background:none; border:1px solid rgba(48,209,88,.4); color:var(--green);
      font-size:13px; font-weight:600; padding:5px 12px; border-radius:20px;
      cursor:pointer; transition:background .15s; }
    .mark-done-btn:active { background:rgba(48,209,88,.1); }

    /* Exercise card */
    .ex-card { background:var(--surface); border-radius:16px; overflow:hidden; }
    .ex-hdr { padding:13px 16px 10px; border-bottom:1px solid var(--border); }
    .ex-name { font-size:16px; font-weight:600; }
    .ex-meta { display:flex; gap:8px; margin-top:3px; flex-wrap:wrap; }
    .ex-note  { font-size:12px; color:var(--text3); }
    .ex-last  { font-size:12px; color:var(--accent); opacity:.7; }
    .ex-cross { font-size:12px; color:var(--orange); opacity:.85; }
    .notes-area { width:100%; min-height:50px; overflow:hidden; background:none; border:none; color:var(--text2);
      font-size:15px; padding:14px 16px; resize:none; outline:none; font-family:inherit; line-height:1.5; }

    /* Set row */
    .set-row { display:flex; align-items:center; padding:9px 14px 9px 16px;
      border-bottom:1px solid var(--border); gap:4px; transition:background .2s; }
    .set-row:last-of-type { border-bottom:none; }
    .set-row.is-done { background:rgba(48,209,88,.09); }
    .set-row.is-drop { background:rgba(255,159,10,.06); }
    .set-num { width:28px; font-size:12px; color:var(--text3); font-weight:600; flex-shrink:0; }
    .set-num.wu { color:var(--orange); font-size:11px; }
    .set-x { color:var(--text3); font-size:14px; padding:0 4px; flex-shrink:0; }

    /* Steppers */
    .stepper { display:flex; align-items:center; gap:3px; }
    .stepper.w-step { flex:1; }
    .stepper.r-step { flex:0 0 auto; padding-right:6px; }
    .step-btn { width:30px; height:30px; border-radius:50%; background:var(--surface2);
      border:none; color:var(--text2); font-size:17px; line-height:1; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:background .1s; user-select:none; -webkit-user-select:none; }
    .step-btn:active { background:rgba(255,255,255,.15); }
    .step-val { font-size:16px; font-weight:700; min-width:32px; text-align:center;
      cursor:pointer; padding:4px 2px; border-radius:4px; }
    .step-val:active { background:var(--surface2); }
    .step-unit { font-size:11px; color:var(--text3); }
    .step-input { font-size:16px; font-weight:700; width:52px; background:var(--surface2);
      border:1.5px solid var(--accent); border-radius:6px; color:var(--text);
      text-align:center; padding:4px 2px; outline:none; -webkit-appearance:none; }

    /* Done button */
    .chk-btn { width:34px; height:34px; border-radius:50%; border:2px solid var(--border);
      background:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all .2s; }
    .chk-btn.on { background:var(--green); border-color:var(--green); }

    /* Drop set button */
    .drop-btn { width:100%; padding:10px 16px; background:none; border:none;
      border-top:1px solid var(--border); color:var(--accent); font-size:14px;
      cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .15s; }
    .drop-btn:active { background:var(--surface2); }

    /* Warmup */
    .warmup-row { padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; }
    .warmup-txt { flex:1; font-size:15px; }

    /* Checkbox */
    .chkbox { width:24px; height:24px; border-radius:50%; border:2px solid var(--border);
      background:none; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all .2s; }
    .chkbox.on { background:var(--green); border-color:var(--green); }

    /* Physio */
    .physio-row { display:flex; align-items:center; gap:12px; padding:12px 16px;
      cursor:pointer; border-bottom:1px solid var(--border); transition:background .15s; }
    .physio-row:last-child { border-bottom:none; }
    .physio-row:active { background:var(--surface2); }
    .physio-txt { flex:1; font-size:15px; }
    .physio-txt.struck { color:var(--text3); text-decoration:line-through; }

    /* Swim */
    .swim-row { display:flex; align-items:center; padding:14px 16px; gap:12px;
      border-bottom:1px solid var(--border); }
    .swim-row:last-child { border-bottom:none; }
    .swim-lbl { flex:1; font-size:15px; }
    .swim-input { width:80px; background:var(--surface2); border:1.5px solid var(--border);
      border-radius:8px; color:var(--text); text-align:center; padding:8px;
      font-size:17px; font-weight:600; outline:none; -webkit-appearance:none; }
    .swim-input:focus { border-color:var(--accent); }

    /* Buttons */
    .btn-primary { width:100%; padding:16px; background:var(--accent); color:#fff;
      border:none; border-radius:14px; font-size:17px; font-weight:600;
      cursor:pointer; transition:opacity .15s; }
    .btn-primary:active { opacity:.8; }
    .btn-copy { width:100%; padding:16px; background:var(--surface); color:var(--accent);
      border:none; border-radius:14px; font-size:17px; font-weight:600;
      cursor:pointer; transition:background .15s; }
    .btn-copy:active { background:var(--surface2); }
    .btn-copy.copied { color:var(--green); }

    /* Summary */
    .summary-box { background:var(--surface); border-radius:16px; padding:16px;
      font-family:'SF Mono',Menlo,monospace; font-size:13px; line-height:1.65;
      color:var(--text2); white-space:pre-wrap; word-break:break-word; }

    /* Timer bar */
    .timer-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:430px; background:rgba(22,22,24,.97);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      padding:12px 20px calc(var(--safe-bot) + 12px);
      display:flex; align-items:center; justify-content:space-between; z-index:200; }
    .timer-info { display:flex; flex-direction:column; }
    .timer-lbl { font-size:12px; color:var(--text3); }
    .timer-cnt { font-size:30px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.5px; }
    .timer-cnt.urgent { color:var(--red); }
    .timer-done { font-size:15px; font-weight:600; color:var(--green); }
    .skip-btn { background:var(--surface2); border:none; color:var(--text);
      font-size:14px; font-weight:600; padding:9px 18px; border-radius:20px;
      cursor:pointer; transition:background .15s; }
    .skip-btn:active { background:var(--border); }

    /* Loading / error */
    .center { display:flex; flex-direction:column; align-items:center;
      justify-content:center; min-height:60vh; gap:14px; padding:24px; text-align:center; }
    .spinner { width:32px; height:32px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .note-text { font-size:14px; color:var(--text2); text-align:center; }
    .card { background:var(--surface); border-radius:16px; overflow:hidden; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ── Icons ──────────────────────────────────────────────────
const IC = {
  check: `<svg width="14" height="11" viewBox="0 0 14 11" fill="none"><path d="M1 5.5 5.5 10 13 1" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  chkSm:`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5 4 7.5 10 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  back: `<svg width="9" height="15" viewBox="0 0 9 15" fill="none"><path d="M8 1 1.5 7.5 8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  chev: `<svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
};
const SESS_ICONS = {Legs:'🦵',Pull:'🏋️',Push:'💪',Upper:'🔄',Swim:'🏊',Rest:'😴'};
const SESS_CLS   = {Legs:'ic-legs',Pull:'ic-pull',Push:'ic-push',Upper:'ic-upper',Swim:'ic-swim',Rest:'ic-rest'};

// ── State ──────────────────────────────────────────────────
const TIMER_SECS = 120;
const APP_VER = '1.2';

const S = {
  plan: null,
  view: 'loading',
  err: null,
  idx: null,
  ws: {},
  timer: { on:false, endAt:null, tid:null, expired:false },
};

// ── Persistence ────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('gym_ws', JSON.stringify(S.ws));
    if (S.timer.on && S.timer.endAt)
      localStorage.setItem('gym_timer', String(S.timer.endAt));
    else
      localStorage.removeItem('gym_timer');
  } catch(_) {}
}
function load() {
  try {
    if (localStorage.getItem('gym_ver') !== APP_VER) {
      localStorage.removeItem('gym_ws');
      localStorage.removeItem('gym_timer');
      localStorage.setItem('gym_ver', APP_VER);
      return;
    }
    const d = localStorage.getItem('gym_ws');
    if (d) S.ws = JSON.parse(d);
    // Restore timer if it was running and hasn't expired
    const endAt = parseInt(localStorage.getItem('gym_timer') || '0');
    if (endAt && endAt > Date.now()) {
      S.timer.on = true;
      S.timer.endAt = endAt;
      S.timer.tid = setInterval(timerTick, 500);
    } else {
      localStorage.removeItem('gym_timer');
    }
  } catch(_) {}
}

// ── Session state init ─────────────────────────────────────
function ensureWS(idx) {
  if (!S.ws[idx]) S.ws[idx] = {};
  const ws = S.ws[idx];
  const s  = S.plan.sessions[idx];
  if (ws.startTime  === undefined) ws.startTime  = null;
  if (ws.endTime    === undefined) ws.endTime    = null;
  if (!ws.endTime && s.done) ws.endTime = -1;
  if (ws.warmup     === undefined) ws.warmup     = false;
  if (!ws.laps) ws.laps = '';
  if (!ws.mins) ws.mins = '';
  if (ws.notes === undefined) ws.notes = '';
  const physioLen = (s.physio||[]).length;
  if (!Array.isArray(ws.physio) || ws.physio.length !== physioLen)
    ws.physio = new Array(physioLen).fill(false);
  const exLen = (s.exercises||[]).length;
  if (!Array.isArray(ws.sets) || ws.sets.length !== exLen) {
    ws.sets = (s.exercises||[]).map(ex =>
      ex.sets.map(set => ({w:set.weight,r:set.reps,done:false,warmup:!!set.warmup,drop:false}))
    );
  } else {
    (s.exercises||[]).forEach((ex,ei) => {
      const existing = ws.sets[ei]||[];
      const planSets = ex.sets.map((set,si) => ({
        w:      (existing[si] && !existing[si].drop) ? existing[si].w    : set.weight,
        r:      (existing[si] && !existing[si].drop) ? existing[si].r    : set.reps,
        done:   (existing[si] && !existing[si].drop) ? existing[si].done : false,
        warmup: !!set.warmup, drop:false
      }));
      const drops = existing.filter(s=>s.drop);
      ws.sets[ei] = [...planSets,...drops];
    });
  }
}

// ── Timer ──────────────────────────────────────────────────
function timerStart() {
  timerStop();
  S.timer.on = true;
  S.timer.endAt = Date.now() + TIMER_SECS * 1000;
  S.timer.expired = false;
  S.timer.tid = setInterval(timerTick, 500);
  save();
  timerTick();
}
function timerTick() {
  if (!S.timer.on || !S.timer.endAt) return;
  const rem = Math.ceil((S.timer.endAt - Date.now()) / 1000);
  if (rem <= 0) {
    S.timer.on = false;
    S.timer.expired = true;
    clearInterval(S.timer.tid); S.timer.tid = null;
    localStorage.removeItem('gym_timer');
    beep(); notifyDone();
    timerDraw();
    // Auto-hide the "done" banner after 4 seconds
    setTimeout(() => { S.timer.expired = false; timerDraw(); }, 4000);
  } else {
    timerDraw();
  }
}
function timerStop() {
  if (S.timer.tid) { clearInterval(S.timer.tid); S.timer.tid = null; }
  S.timer.on = false; S.timer.endAt = null; S.timer.expired = false;
  localStorage.removeItem('gym_timer');
  timerDraw();
}
function timerFmt(endAt) {
  return Math.ceil((endAt - Date.now()) / 1000);
}
function timerDraw() {
  let el = document.getElementById('timer-bar');
  if (!S.timer.on && !S.timer.expired) { if (el) el.remove(); return; }
  let inner;
  if (S.timer.expired) {
    inner = `<div class="timer-info"><div class="timer-lbl">Rest</div>
      <div class="timer-done">Time's up!</div></div>
      <button class="skip-btn" onclick="timerStop()">Dismiss</button>`;
  } else {
    const rem = Math.max(0, Math.ceil((S.timer.endAt - Date.now()) / 1000));
    const m = Math.floor(rem/60), sec = rem%60;
    const fmt = `${m}:${String(sec).padStart(2,'0')}`;
    const urgent = rem <= 10;
    inner = `<div class="timer-info"><div class="timer-lbl">Rest</div>
      <div class="timer-cnt${urgent?' urgent':''}">${fmt}</div></div>
      <button class="skip-btn" onclick="timerStop()">Skip</button>`;
  }
  const html = `<div class="timer-bar" id="timer-bar">${inner}</div>`;
  if (el) el.outerHTML = html; else document.body.insertAdjacentHTML('beforeend', html);
}
function requestNotifPerm() {
  if ('Notification' in window && Notification.permission === 'default')
    Notification.requestPermission();
}
function notifyDone() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try { new Notification('Rest done! 💪', { body: 'Time to hit the next set.', icon: './icon.svg' }); } catch(_) {}
}
function beep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[880,.0],[1100,.25],[880,.5]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(.35,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.35);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+.35);
    });
  } catch(_) {}
}

// ── Visibility change (phone lock / tab switch) ────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  if (S.timer.on && S.timer.endAt) timerTick();
  // Also check localStorage in case browser was closed and re-opened
  else {
    try {
      const endAt = parseInt(localStorage.getItem('gym_timer')||'0');
      if (endAt && Date.now() >= endAt) {
        localStorage.removeItem('gym_timer');
        S.timer.expired = true;
        beep(); notifyDone();
        timerDraw();
        setTimeout(()=>{ S.timer.expired=false; timerDraw(); }, 4000);
      }
    } catch(_) {}
  }
});

// ── Summary ────────────────────────────────────────────────
function genSummary(idx) {
  const s=S.plan.sessions[idx], ws=S.ws[idx];
  const d=new Date(s.date);
  const dd=String(d.getUTCDate()).padStart(2,'0');
  const mm=String(d.getUTCMonth()+1).padStart(2,'0');
  const yy=String(d.getUTCFullYear()).slice(2);
  const lines=[];
  if (s.type==='Swim') {
    lines.push(`Swim ${ws.laps||'?'} laps, ${ws.mins||'?'} minutes.`);
  } else {
    (s.exercises||[]).forEach((ex,ei)=>{
      const sets=ws.sets[ei]; const isBW=ex.sets[0]?.unit==='BW';
      lines.push(ex.note?`${ex.name} (${ex.note})`:ex.name);
      sets.forEach(set=>{
        if (set.warmup)     lines.push(`Warm up 1 x ${set.r} x ${set.w}kg`);
        else if (isBW)      lines.push(String(set.r));
        else                lines.push(`${set.w}kg x ${set.r}`);
      });
      lines.push('');
    });
  }
  const notesSuffix = ws.notes?.trim() ? `\n\nNotes: ${ws.notes.trim()}` : '';
  return `## ${s.type} — ${dd}-${mm}-${yy}\n\n${lines.join('\n').trimEnd()}${notesSuffix}`;
}

// ── Cross-reference ────────────────────────────────────────
function findCrossRef(sessIdx, exName) {
  const results = [];
  S.plan.sessions.forEach((sess, si) => {
    if (si === sessIdx || !sess.exercises || !S.ws[si]?.endTime) return;
    const ei = sess.exercises.findIndex(e => e.name === exName);
    if (ei === -1) return;
    const sets = (S.ws[si].sets?.[ei] || []).filter(s => !s.warmup && !s.drop);
    if (!sets.length) return;
    const isBW = sess.exercises[ei].sets[0]?.unit === 'BW';
    const perf = isBW ? sets.map(s => s.r).join(' / ')
      : sets.map(s => `${s.w}×${s.r}`).join(' / ');
    results.push(`${sess.type}: ${perf}`);
  });
  return results;
}

// ── Render helpers ─────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getSetNum(sets,i) { let n=0; for(let j=0;j<=i;j++) if(!sets[j].warmup) n++; return n; }

function setHTML(html) {
  const sy=document.getElementById('scroll')?.scrollTop||0;
  document.getElementById('app').innerHTML=html;
  const sc=document.getElementById('scroll');
  if (sc&&sy) sc.scrollTop=sy;
}

// ── Render: Home ───────────────────────────────────────────
function renderHome() {
  const today=todayStr();
  const cards=S.plan.sessions.map((s,i)=>{
    const ws=S.ws[i]; const done=!!ws?.endTime||!!s.done;
    const isToday=s.date===today; const isPast=s.date<today;
    const clickable=s.type!=='Rest';
    let badge='';
    if (done)         badge=`<span class="badge badge-done">Done</span>`;
    else if (isToday) badge=`<span class="badge badge-today">Today</span>`;
    const doneCls=done?' sess-done-strip':'';
    const markDoneRow=(!done && isPast && clickable)
      ?`<div class="mark-done-row"><button class="mark-done-btn" onclick="event.stopPropagation();markDone(${i})">✓ Mark as done</button></div>`
      :'';
    return `<div class="sess-card${doneCls}">
      <div class="sess-main" ${clickable?`onclick="openSess(${i})"`:''}
        role="${clickable?'button':''}" tabindex="${clickable?0:-1}">
        <div class="sess-icon ${SESS_CLS[s.type]||'ic-rest'}">${SESS_ICONS[s.type]||'🏋️'}</div>
        <div class="sess-info">
          <div class="sess-type">${s.type}</div>
          <div class="sess-day">${s.dayLabel}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${badge}${clickable?`<div class="chevron">${IC.chev}</div>`:''}
        </div>
      </div>
      ${markDoneRow}
    </div>`;
  }).join('');
  setHTML(`
    <div class="hdr"><div class="hdr-row"><div class="hdr-title">Plan: ${esc(S.plan.weekLabel)}</div></div></div>
    <div class="scroll" id="scroll">
      <div style="text-align:center"><span style="font-size:13px;color:var(--text3)">Current Block</span>
      <div style="font-size:26px;font-weight:700;margin-top:2px">${esc(S.plan.weekLabel)}</div></div>
      ${cards}
    </div>`);
}

// ── Render: Session ────────────────────────────────────────
function renderSession() {
  const i=S.idx, s=S.plan.sessions[i], ws=S.ws[i];
  if (!ws.startTime) { ws.startTime=Date.now(); save(); }
  let body='';
  if (s.type==='Swim')       body=renderSwim(s,ws,i);
  else if (s.type==='Rest')  body=`<div class="center" style="min-height:40vh"><div style="font-size:56px">😴</div><p class="note-text">${esc(s.note||'Rest day!')}</p></div>`;
  else                        body=renderGym(s,ws,i);
  setHTML(`
    <div class="hdr"><div class="hdr-row">
      <button class="back-btn" onclick="goHome()">${IC.back} Week</button>
      <div class="hdr-title">${esc(s.type)}</div>
      <div class="hdr-spacer"></div>
    </div></div>
    <div class="scroll" id="scroll">
      <div class="note-text" style="margin-top:-2px">${esc(s.dayLabel)}</div>
      ${body}
    </div>`);
  timerDraw();
  // Scroll to first incomplete set
  requestAnimationFrame(()=>{
    const sc=document.getElementById('scroll');
    const first=document.querySelector('.set-row:not(.is-done)');
    if (sc&&first) sc.scrollTop=Math.max(0,first.offsetTop-sc.offsetTop-70);
    document.querySelectorAll('.notes-area').forEach(el=>{
      el.style.height='auto'; el.style.height=el.scrollHeight+'px';
    });
  });
}

function renderGym(s,ws,i) {
  const wu=s.warmup?`
    <div class="sec-lbl">Warm-up</div>
    <div class="card"><div class="warmup-row" onclick="togWarmup(${i})">
      <div class="warmup-txt">${esc(s.warmup)}</div>
      <div class="chkbox${ws.warmup?' on':''}">${ws.warmup?IC.chkSm:''}</div>
    </div></div>`:'';

  const exHtml=(s.exercises||[]).map((ex,ei)=>{
    const sets=(ws.sets&&ws.sets[ei])||[];
    const isBW=ex.sets[0]?.unit==='BW';
    const setRows=sets.map((set,si)=>{
      const numLbl=set.warmup
        ?`<span class="set-num wu">WU</span>`
        :`<span class="set-num">S${getSetNum(sets,si)}</span>`;
      const wPart=isBW
        ?`<span style="font-size:13px;color:var(--text3);padding:0 6px;">BW</span>`
        :`<div class="stepper w-step">
            <button class="step-btn" onclick="stepVal(${i},${ei},${si},'w',-2.5)">−</button>
            <span class="step-val" onclick="editVal(event,${i},${ei},${si},'w')">${set.w}</span>
            <span class="step-unit">kg</span>
            <button class="step-btn" onclick="stepVal(${i},${ei},${si},'w',2.5)">+</button>
          </div>`;
      const rPart=`<div class="stepper r-step">
        <button class="step-btn" onclick="stepVal(${i},${ei},${si},'r',-1)">−</button>
        <span class="step-val" onclick="editVal(event,${i},${ei},${si},'r')">${set.r}</span>
        <button class="step-btn" onclick="stepVal(${i},${ei},${si},'r',1)">+</button>
      </div>`;
      const cls=['set-row',set.done?'is-done':'',set.drop?'is-drop':''].filter(Boolean).join(' ');
      const removeDrop=set.drop
        ?`<button onclick="removeDropSet(${i},${ei},${si})" style="background:none;border:none;color:var(--red);font-size:18px;padding:0 4px;cursor:pointer;flex-shrink:0">×</button>`
        :'';
      return `<div class="${cls}">
        ${numLbl}${wPart}<span class="set-x">×</span>${rPart}
        ${removeDrop}
        <button class="chk-btn${set.done?' on':''}" onclick="togSet(${i},${ei},${si})">
          ${set.done?IC.check:''}
        </button>
      </div>`;
    }).join('');
    const metaParts=[];
    if (ex.note)     metaParts.push(`<span class="ex-note">${esc(ex.note)}</span>`);
    if (ex.lastPerf) metaParts.push(`<span class="ex-last">Last: ${esc(ex.lastPerf)}</span>`);
    findCrossRef(i, ex.name).forEach(r => metaParts.push(`<span class="ex-cross">${esc(r)}</span>`));
    return `<div class="ex-card">
      <div class="ex-hdr">
        <div class="ex-name">${esc(ex.name)}</div>
        ${metaParts.length?`<div class="ex-meta">${metaParts.join('')}</div>`:''}
      </div>
      ${setRows}
      <button class="drop-btn" onclick="addDrop(${i},${ei})">+ Drop Set</button>
    </div>`;
  }).join('');

  const physHtml=(s.physio||[]).length?`
    <div class="sec-lbl">Physio / Mobility</div>
    <div class="card">${(s.physio||[]).map((item,pi)=>`
      <div class="physio-row" onclick="togPhysio(${i},${pi})">
        <div class="physio-txt${ws.physio[pi]?' struck':''}">${esc(item)}</div>
        <div class="chkbox${ws.physio[pi]?' on':''}">${ws.physio[pi]?IC.chkSm:''}</div>
      </div>`).join('')}
    </div>`:'';

  const notesHtml=`
    <div class="sec-lbl">Notes</div>
    <div class="card"><textarea class="notes-area" placeholder="Modifications, how you felt, anything…"
      oninput="upNotes(${i},this.value,this)">${esc(ws.notes||'')}</textarea></div>`;
  return `${wu}<div class="sec-lbl">Main Work</div>${exHtml}${physHtml}${notesHtml}
    <button class="btn-primary" onclick="finishSess(${i})">Finish Workout</button>`;
}

function renderSwim(s,ws,i) {
  return `<div class="sec-lbl">Log Your Swim</div>
    <div class="card">
      <div class="swim-row">
        <div class="swim-lbl">Laps</div>
        <input class="swim-input" type="number" inputmode="numeric" value="${esc(ws.laps)}"
          onchange="upSwim(${i},'laps',this.value)" placeholder="0">
      </div>
      <div class="swim-row">
        <div class="swim-lbl">Minutes</div>
        <input class="swim-input" type="number" inputmode="numeric" value="${esc(ws.mins)}"
          onchange="upSwim(${i},'mins',this.value)" placeholder="0">
      </div>
    </div>
    <div class="sec-lbl">Notes</div>
    <div class="card"><textarea class="notes-area" placeholder="How it felt, anything to flag…"
      oninput="upNotes(${i},this.value,this)">${esc(ws.notes||'')}</textarea></div>
    <button class="btn-primary" onclick="finishSess(${i})">Done</button>`;
}

// ── Render: Summary ────────────────────────────────────────
function renderSummary() {
  const ws=S.ws[S.idx];
  const justFinished=ws?.endTime&&(Date.now()-ws.endTime)<30000;
  const title=justFinished?'Workout Done':'Session Log';
  const summary=genSummary(S.idx);
  setHTML(`
    <div class="hdr"><div class="hdr-row">
      <button class="back-btn" onclick="goHome()">${IC.back} Week</button>
      <div class="hdr-title">${title}</div>
      <div class="hdr-spacer"></div>
    </div></div>
    <div class="scroll" id="scroll">
      <p class="note-text">Copy and paste into Claude to log this session and update Training State.</p>
      <div class="summary-box">${esc(summary)}</div>
      <button class="btn-copy" id="cpybtn" onclick="copySummary()">Copy to Clipboard</button>
      <button class="btn-primary" onclick="goHome()">Back to Week</button>
    </div>`);
}

// ── Render root ────────────────────────────────────────────
function render() {
  if (S.view==='loading') {
    document.getElementById('app').innerHTML=`<div class="center"><div class="spinner"></div><p style="color:var(--text3)">Loading…</p></div>`;
    return;
  }
  if (S.view==='error') {
    document.getElementById('app').innerHTML=`<div class="center">
      <div style="font-size:48px">⚠️</div><p style="font-weight:600">Could not load plan</p>
      <p style="color:var(--text3);font-size:14px">${esc(S.err||'Check connection and try again.')}</p>
      <button class="btn-primary" style="max-width:200px" onclick="loadPlan()">Retry</button>
    </div>`;
    return;
  }
  if (S.view==='home')    { renderHome();    return; }
  if (S.view==='session') { renderSession(); return; }
  if (S.view==='summary') { renderSummary(); return; }
}

// ── Actions ────────────────────────────────────────────────
function openSess(i) {
  requestNotifPerm();
  ensureWS(i); S.idx=i;
  if (S.ws[i]?.endTime) {
    S.view='summary';
    history.pushState({view:'summary',idx:i},'','#sum/'+i);
  } else {
    S.view='session';
    history.pushState({view:'session',idx:i},'','#s/'+i);
  }
  render();
}
function goHome() {
  timerStop(); S.view='home'; S.idx=null;
  history.pushState({view:'home',idx:null},'','#');
  render();
}
function finishSess(i) {
  S.ws[i].endTime=Date.now(); save();
  S.idx=i; S.view='summary';
  history.pushState({view:'summary',idx:i},'','#sum/'+i);
  render();
}
function markDone(i) {
  ensureWS(i); S.ws[i].endTime=Date.now(); save(); render();
}
function togWarmup(i) { S.ws[i].warmup=!S.ws[i].warmup; save(); render(); }
function togSet(i,ei,si) {
  const set=S.ws[i].sets[ei][si]; set.done=!set.done;
  if (set.done) timerStart();
  save(); render();
}
function togPhysio(i,pi) { S.ws[i].physio[pi]=!S.ws[i].physio[pi]; save(); render(); }
function addDrop(i,ei) {
  const sets=S.ws[i].sets[ei], last=sets[sets.length-1];
  sets.push({w:last.w,r:last.r,done:false,warmup:false,drop:true});
  save(); render();
}
function removeDropSet(i,ei,si) {
  S.ws[i].sets[ei].splice(si,1); save(); render();
}
function upSwim(i,field,val) { S.ws[i][field]=val; save(); }
function upNotes(i,val,el) {
  S.ws[i].notes=val; save();
  if (el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
}
function stepVal(i,ei,si,field,delta) {
  const set=S.ws[i].sets[ei][si];
  const isDB=!!S.plan.sessions[i].exercises?.[ei]?.db;
  let v=(set[field]||0)+delta;
  if (field==='w') {
    v=Math.round(v*4)/4;
    if (isDB) v=Math.min(22.5,Math.max(2.5,Math.round(v/2.5)*2.5));
    else v=Math.max(0,v);
  }
  if (field==='r') v=Math.max(1,Math.round(v));
  set[field]=v; save(); render();
}
function editVal(event,i,ei,si,field) {
  event.stopPropagation();
  const span=event.target, cur=S.ws[i].sets[ei][si][field];
  const inp=document.createElement('input');
  inp.type='number'; inp.className='step-input';
  inp.value=cur; inp.inputMode='decimal'; inp.step=field==='w'?'2.5':'1';
  span.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{ const v=parseFloat(inp.value); S.ws[i].sets[ei][si][field]=isNaN(v)?cur:v; save(); render(); };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') inp.blur(); });
}
function copySummary() {
  const text=genSummary(S.idx);
  const btn=document.getElementById('cpybtn');
  const ok=()=>{ if(btn){btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy to Clipboard';btn.classList.remove('copied');},2000);} };
  if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(ok).catch(fb);
  else fb();
  function fb() {
    const ta=Object.assign(document.createElement('textarea'),{value:text,style:'position:fixed;opacity:0'});
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); ok();
  }
}

// ── Popstate (iOS swipe-back) ──────────────────────────────
window.addEventListener('popstate',(e)=>{
  timerStop();
  const st=e.state;
  if (st) { S.view=st.view||'home'; S.idx=st.idx??null; if(S.idx!==null) ensureWS(S.idx); }
  else    { S.view='home'; S.idx=null; }
  render();
});

// ── Load plan ──────────────────────────────────────────────
async function loadPlan() {
  S.view='loading'; render();
  try {
    const res=await fetch('./plan.json?_='+Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    S.plan=await res.json(); S.view='home';
  } catch(e) { S.err=e.message; S.view='error'; }
  render();
  // If timer was restored on load, draw it now
  if (S.timer.on) timerDraw();
}

// ── Boot ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
load();
history.replaceState({view:'home',idx:null},'',location.href);
loadPlan();
</script>
